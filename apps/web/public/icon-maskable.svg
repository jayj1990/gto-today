<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="gto.today">
  <!-- Maskable: safe zone is the inner 80% circle (Android trims to a circle or squircle).
       We extend the felt to edges and keep the gold dot well inside the safe zone. -->
  <defs>
    <linearGradient id="felt-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E3B2E"/>
      <stop offset="100%" stop-color="#082018"/>
    </linearGradient>
    <radialGradient id="gold-m" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E8CC72"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8912A"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#felt-m)"/>
  <!-- inner rim -->
  <circle cx="256" cy="256" r="206" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="2"/>
  <circle cx="256" cy="256" r="72" fill="url(#gold-m)"/>
</svg>
