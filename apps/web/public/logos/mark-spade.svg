<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="gto.today">
  <defs>
    <linearGradient id="spade-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E3B2E"/>
      <stop offset="100%" stop-color="#051612"/>
    </linearGradient>
    <linearGradient id="spade-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8CC72"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8C6F1F"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#spade-bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- Stylised spade silhouette, constructed from two mirrored teardrops + a trunk -->
  <g transform="translate(256 256)" fill="url(#spade-gold)">
    <!-- Two lobes -->
    <path d="M 0 -130
             C -78 -130 -130 -78 -130 -28
             C -130 22 -86 56 -34 56
             C -16 56 -4 50 0 42
             C 4 50 16 56 34 56
             C 86 56 130 22 130 -28
             C 130 -78 78 -130 0 -130 Z"/>
    <!-- Trunk / stand -->
    <path d="M -36 56
             L -56 120
             L 56 120
             L 36 56 Z"/>
  </g>

  <!-- Gold dot inside the spade (the brand's signature middle dot) -->
  <circle cx="256" cy="224" r="22" fill="#0E3B2E"/>

  <!-- Horizon line -->
  <rect x="172" y="412" width="168" height="4" rx="2" fill="rgba(212,175,55,0.6)"/>
</svg>
